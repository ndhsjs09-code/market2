<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MW STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --mw-gold: #d4af37; 
            --mw-dark: #050505; 
            --mw-card: #0f0f0f; 
            --mw-border: #1a1a1a;
        }
        body { 
            background: var(--mw-dark); color: #e0e0e0; font-family: sans-serif; 
            padding: 15px; padding-bottom: 110px; margin:0;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }
        .tab { display: none; } .active { display: block; }
        .header-container {
            text-align: center; margin-bottom: 30px; padding: 20px;
            border: 1px solid var(--mw-gold); background: rgba(212, 175, 55, 0.05);
        }
        .header-title { color: var(--mw-gold); font-weight: 900; font-size: 28px; letter-spacing: 5px; margin: 0; }
        .cat-card { 
            background: var(--mw-card); padding: 25px; margin-bottom: 15px; 
            text-align: center; border-left: 4px solid var(--mw-gold); border-top: 1px solid var(--mw-border);
            font-size: 16px; font-weight: bold; color: #fff;
        }
        .card { 
            background: var(--mw-card); border: 1px solid var(--mw-border); 
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .btn { background: var(--mw-gold); color: #000; border: none; padding: 16px; font-weight: 900; width: 100%; border-radius: 4px; }
        .btn-small { background: transparent; color: var(--mw-gold); padding: 8px 15px; border: 1px solid var(--mw-gold); border-radius: 4px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--mw-border); z-index: 1000; }
        .nav-item { color: #444; cursor: pointer; font-weight: 900; font-size: 12px; } 
        .active-nav { color: var(--mw-gold); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #080808; color: #fff; border: 1px solid #222; box-sizing: border-box; }
        .total-box { background: #000; padding: 20px; border: 1px double var(--mw-gold); margin: 20px 0; display: flex; justify-content: space-between; color: var(--mw-gold); font-weight: 900; }
    </style>
</head>
<body>

<div id="store-tab" class="tab active">
    <div class="header-container"><div class="header-title">MW STORE</div></div>
    <div id="cat-menu">
        <div class="cat-card" onclick="showCat('3C/L')">3C / L</div>
        <div class="cat-card" onclick="showCat('4CC/LL')">4CC / LL</div>
        <div class="cat-card" onclick="showCat('Double/Triple')">DOUBLE / TRIPLE</div>
        <div class="cat-card" onclick="showCat('4C/L Same')">4C / L SAME</div>
        <div class="cat-card" onclick="showCat('4C/L')">4C / L</div>
        <div class="cat-card" onclick="showCat('Others')">OTHERS</div>
    </div>
    <div id="items-view" style="display:none">
        <button class="btn-small" onclick="backToCats()" style="margin-bottom:15px">← BACK</button>
        <div id="items-list"></div>
    </div>
</div>

<div id="cart-tab" class="tab">
    <div class="header-container"><div class="header-title">CART</div></div>
    <div id="cart-list"></div>
    <div id="cart-footer" style="display:none">
        <div class="total-box"><span>TOTAL:</span><span>$<span id="total-price">0.00</span></span></div>
        <select id="pay-sel"><option disabled selected>SELECT PAYMENT</option></select>
        <p style="font-size: 12px; color: var(--mw-gold); text-align: center;">Upload screenshot of payment receipt</p>
        <input type="file" id="receipt" accept="image/*">
        <button class="btn" id="send-btn" onclick="sendOrder()">CONFIRM ORDER</button>
    </div>
</div>

<div id="admin-tab" class="tab">
    <div class="header-container"><div class="header-title">ADMIN MW</div></div>
    <textarea id="admin-in" rows="6" placeholder="Format: user|pass|price (One per line)"></textarea>
    <button class="btn" onclick="addAccs()">ADD TO ABUJASIM FOLDER</button>
</div>

<nav class="nav">
    <div class="nav-item active-nav" onclick="tab('store-tab', this)">MARKET</div>
    <div class="nav-item" onclick="tab('cart-tab', this)">CART [<span id="count">0</span>]</div>
    <div id="admin-btn" class="nav-item" style="display:none" onclick="tab('admin-tab', this)">SYSTEM</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    // الرابط من صورة الـ ngrok الخاصة بك
    const API = "https://laquita-unperturbed-altagracia.ngrok-free.app/mw"; 
    const ADMIN_IDS = [5859388511, 6920293690];
    
    let cart = [], allI = [], allP = [];

    // إظهار زر الإدمن للأشخاص المحددين فقط
    if(ADMIN_IDS.includes(tg.initDataUnsafe.user?.id)) document.getElementById('admin-btn').style.display='block';

    function tab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
    }

    async function load() {
        try {
            const r = await fetch(`${API}/get_all`, { headers: { "ngrok-skip-browser-warning": "1" } });
            const d = await r.json();
            allI = d.items; allP = d.payments;
            document.getElementById('pay-sel').innerHTML = '<option disabled selected>SELECT PAYMENT</option>' + 
                allP.map(p => `<option value="${p.split('|')[0]}">${p.split('|')[0]}</option>`).join('');
        } catch(e) { console.error("Server connection failed"); }
    }

    function showCat(c) {
        document.getElementById('cat-menu').style.display='none';
        document.getElementById('items-view').style.display='block';
        const filtered = allI.filter(i => i.c == c);
        document.getElementById('items-list').innerHTML = filtered.length ? filtered.map(i => `
            <div class="card">
                <div><b style="color:var(--mw-gold)">@${i.u}</b><br><small>$${i.p}</small></div>
                <button class="btn-small" onclick="addToCart('${i.u}','${i.p}')">ADD</button>
            </div>`).join('') : '<p style="text-align:center">Empty Category</p>';
    }

    function backToCats() { document.getElementById('cat-menu').style.display='block'; document.getElementById('items-view').style.display='none'; }

    function addToCart(u,p) {
        if(!cart.find(x => x.u === u)) {
            cart.push({u,p});
            document.getElementById('count').innerText = cart.length;
            renderCart();
        }
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        if(cart.length==0) { list.innerHTML="<p style='text-align:center;'>Your cart is empty</p>"; document.getElementById('cart-footer').style.display='none'; }
        else {
            list.innerHTML = cart.map(i => `<div class="card"><span>@${i.u}</span><button class="btn-small" style="color:red; border-color:red;" onclick="removeFromCart('${i.u}')">REMOVE</button></div>`).join('');
            document.getElementById('cart-footer').style.display='block';
            document.getElementById('total-price').innerText = cart.reduce((s,i) => s + parseFloat(i.p), 0).toFixed(2);
        }
    }

    function removeFromCart(u) {
        cart = cart.filter(i => i.u !== u);
        document.getElementById('count').innerText = cart.length;
        renderCart();
    }

    async function sendOrder() {
        const f = document.getElementById('receipt').files[0];
        const payMethod = document.getElementById('pay-sel').value;
        if(!f || payMethod === "SELECT PAYMENT") return tg.showAlert("Please select payment and upload receipt");
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true; btn.innerText = "PROCESSING...";
        
        const reader = new FileReader();
        reader.readAsDataURL(f);
        reader.onload = async () => {
            try {
                const r = await fetch(`${API}/submit`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        user_id:tg.initDataUnsafe.user.id,
                        items:cart, method:payMethod,
                        image:reader.result, total:document.getElementById('total-price').innerText
                    })
                });
                if(r.ok) tg.showAlert("Order sent! Wait for admin approval.", () => tg.close());
                else { tg.showAlert("Server Error"); btn.disabled = false; btn.innerText = "CONFIRM ORDER"; }
            } catch(e) { tg.showAlert("Connection Error"); btn.disabled = false; }
        }
    }

    async function addAccs() {
        const data = document.getElementById('admin-in').value;
        if(!data) return;
        await fetch(`${API}/admin/add`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, data:data})
        });
        tg.showAlert("Added to abujasim/inventory.txt"); 
        document.getElementById('admin-in').value = "";
        load();
    }

    tg.expand(); load();
</script>
</body>
</html>
