<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MW Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; padding: 15px; margin:0; padding-bottom: 100px; }
        .tab { display: none; } .active { display: block; }
        .mw-tag { color: var(--gold); font-weight: 900; text-align: center; display: block; margin-bottom: 5px; }
        .header-title { text-align: center; color: var(--gold); font-weight: 900; margin-bottom: 20px; font-size: 22px; border: 1px solid var(--gold); padding: 10px; }
        .cat-card { background: var(--card); padding: 22px; margin-bottom: 10px; text-align: center; border-left: 4px solid var(--gold); font-weight: bold; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--gold); color: #000; border: none; padding: 14px; width: 100%; font-weight: 900; }
        .btn-small { background: transparent; color: var(--gold); padding: 5px 10px; border: 1px solid var(--gold); font-size: 11px; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 18px 0; border-top: 1px solid #1a1a1a; }
        .nav-item { color: #444; cursor: pointer; font-weight: 900; } .active-nav { color: var(--gold); }
    </style>
</head>
<body>
<span class="mw-tag">#MW Market</span>
<div id="store-tab" class="tab active">
    <div class="header-title">MW STORE</div>
    <div id="cat-menu">
        <div class="cat-card" onclick="showCat('3C/L')">3C / L</div>
        <div class="cat-card" onclick="showCat('4CC/LL')">4CC / LL</div>
        <div class="cat-card" onclick="showCat('Double/Triple')">DOUBLE / TRIPLE</div>
        <div class="cat-card" onclick="showCat('Others')">OTHERS</div>
    </div>
    <div id="items-view" style="display:none">
        <button class="btn-small" onclick="backToCats()" style="margin-bottom:10px">BACK</button>
        <div id="items-list"></div>
    </div>
</div>

<div id="cart-tab" class="tab">
    <div class="header-title">MW CART</div>
    <div id="cart-list"></div>
    <div id="cart-footer" style="display:none; text-align:center;">
        <button class="btn">PROCEED TO PAY</button>
    </div>
</div>

<div id="admin-tab" class="tab">
    <div class="header-title">MW SYSTEM</div>
    <select id="mw-cat"><option value="3C/L">3C/L</option><option value="Others">Others</option></select>
    <textarea id="mw-in" rows="4" style="width:100%; background:#0a0a0a; color:#fff;"></textarea>
    <button class="btn" onclick="mwAdd()">SAVE ACCOUNT</button>
    <div id="mw-admin-items" style="margin-top:20px"></div>
</div>

<nav class="nav">
    <div class="nav-item active-nav" onclick="tab('store-tab', this)">MARKET</div>
    <div class="nav-item" onclick="tab('cart-tab', this)">CART (<span id="mw-cart-count">0</span>)</div>
    <div id="admin-btn" class="nav-item" style="display:none" onclick="tab('admin-tab', this)">SYSTEM</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const API = "https://laquita-unperturbed-altagracia.ngrok-free.dev/mw";
    const ADMIN_MW = [5859388511, 6920293690];
    let mwI = [], cart = [];

    if(ADMIN_MW.includes(tg.initDataUnsafe.user?.id)) document.getElementById('admin-btn').style.display='block';

    function tab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        if(id==='admin-tab') renderMwAdmin();
        if(id==='cart-tab') renderMwCart();
    }

    async function load() {
        const r = await fetch(`${API}/get_all`, { headers: {"ngrok-skip-browser-warning":"1"} });
        const d = await r.json(); mwI = d.items;
    }

    function addToCart(u, p) {
        cart.push({u, p});
        document.getElementById('mw-cart-count').innerText = cart.length;
    }

    function renderMwCart() {
        const list = document.getElementById('cart-list');
        if(cart.length === 0) { list.innerHTML = "<p style='text-align:center;'>EMPTY</p>"; return; }
        list.innerHTML = cart.map((i, idx) => `<div class="card"><span>@${i.u}</span><button class="btn-small" style="color:red;border-color:red" onclick="cart.splice(${idx},1);renderMwCart();">DEL</button></div>`).join('');
        document.getElementById('cart-footer').style.display = 'block';
    }

    async function mwAdd() {
        const content = document.getElementById('mw-in').value;
        const cat = document.getElementById('mw-cat').value;
        await fetch(`${API}/admin/manage`, {
            method:'POST', headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
            body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, action:'add_users', content, cat})
        });
        document.getElementById('mw-in').value=""; load();
    }

    function renderMwAdmin() {
        document.getElementById('mw-admin-items').innerHTML = mwI.slice(0,10).map(i => `
            <div class="card"><span>@${i.u}</span><button class="btn-small" style="color:red;border-color:red" onclick="delMw('${i.u}')">DEL</button></div>`).join('');
    }

    async function delMw(u) {
        await fetch(`${API}/admin/manage`, {
            method:'POST', headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
            body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, action:'del_user', content:u})
        });
        load(); setTimeout(renderMwAdmin, 500);
    }

    function showCat(c) {
        document.getElementById('cat-menu').style.display='none';
        document.getElementById('items-view').style.display='block';
        const fil = mwI.filter(i => i.c == c);
        document.getElementById('items-list').innerHTML = fil.map(i => `<div class="card"><div><b style="color:var(--gold)">@${i.u}</b><br><small>$${i.p}</small></div><button class="btn-small" onclick="addToCart('${i.u}','${i.p}')">ADD</button></div>`).join('');
    }

    function backToCats() { document.getElementById('cat-menu').style.display='block'; document.getElementById('items-view').style.display='none'; }
    tg.expand(); load();
</script>
</body>
</html>
