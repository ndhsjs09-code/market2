<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MW MARKET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0f0f0f; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; padding: 15px; margin:0; padding-bottom: 100px; }
        .tab { display: none; } .active { display: block; }
        .header { text-align: center; color: var(--gold); font-weight: 900; margin-bottom: 20px; font-size: 22px; border: 1px solid var(--gold); padding: 10px; text-transform: uppercase; }
        .cat-card { background: var(--card); padding: 18px; margin-bottom: 8px; text-align: center; border-left: 4px solid var(--gold); font-weight: bold; cursor: pointer; color: var(--gold); }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 14px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 4px; margin-top: 10px; text-transform: uppercase; }
        .btn-small { background: transparent; color: var(--gold); padding: 6px 12px; border: 1px solid var(--gold); font-size: 11px; font-weight: bold; border-radius: 2px; }
        .btn-small:disabled { border-color: #333; color: #444; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 18px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { color: #444; cursor: pointer; font-weight: 900; } .active-nav { color: var(--gold); }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; background: #0a0a0a; color: #fff; border: 1px solid #222; border-radius: 4px; box-sizing: border-box; text-align: center; }
        .copy-box { background: #000; padding: 15px; border: 1px dashed var(--gold); margin: 10px 0; color: var(--gold); font-weight: bold; cursor: pointer; text-align: center; font-family: monospace; font-size: 18px; }
    </style>
</head>
<body>

<div id="store-tab" class="tab active">
    <div class="header">MW MARKET</div>
    <div id="cat-menu">
        <div class="cat-card" onclick="showCat('3c/L')">3c / L</div>
        <div class="cat-card" onclick="showCat('4LL/CC')">4LL / CC</div>
        <div class="cat-card" onclick="showCat('4C/L Same')">4C / L Same</div>
        <div class="cat-card" onclick="showCat('4C/L')">4C / L</div>
        <div class="cat-card" onclick="showCat('Double/Triple')">Double / Triple</div>
    </div>
    <div id="items-view" style="display:none">
        <button class="btn-small" onclick="backToCats()" style="margin-bottom:15px">BACK</button>
        <div id="items-list"></div>
    </div>
</div>

<div id="cart-tab" class="tab">
    <div class="header">MW CART</div>
    <div id="cart-list"></div>
    <div id="checkout-sec" style="display:none">
        <select id="pay-sel" onchange="showPay(this.value)"><option value="">SELECT PAYMENT</option></select>
        <div id="pay-details" style="display:none;">
            <div class="copy-box" onclick="copyNum(this.innerText)" id="pay-num"></div>
            <p style="text-align:center; font-size:10px; color:var(--gold)">CLICK TO COPY</p>
        </div>
        <button class="btn" onclick="confirmOrder()">SEND ORDER</button>
    </div>
</div>

<div id="admin-tab" class="tab">
    <div class="header">SYSTEM CONTROL</div>
    <select id="adm-cat"><option value="3c/L">3c/L</option><option value="4LL/CC">4LL/CC</option><option value="4C/L Same">4C/L Same</option><option value="4C/L">4C/L</option><option value="Double/Triple">Double/Triple</option></select>
    <textarea id="adm-in" rows="3" placeholder="user:pass:price (accepts : | / ;)"></textarea>
    <button class="btn" onclick="doAdm('add_users')">SAVE ITEMS</button>
    <hr style="border:0; border-top:1px solid #1a1a1a; margin:20px 0;">
    <input id="pay-in" placeholder="Method | Details">
    <button class="btn" onclick="doAdm('add_pay')">ADD PAYMENT</button>
    <div id="adm-pay-list" style="margin-top:15px"></div>
    <div id="adm-items-list" style="margin-top:15px"></div>
</div>

<nav class="nav">
    <div class="nav-item active-nav" onclick="tab('store-tab', this)">STORE</div>
    <div class="nav-item" onclick="tab('cart-tab', this)">CART (<span id="c-count">0</span>)</div>
    <div id="adm-btn" class="nav-item" style="display:none" onclick="tab('admin-tab', this)">SYSTEM</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const API = "https://laquita-unperturbed-altagracia.ngrok-free.dev/mw";
    const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    let allI = [], allP = [], cart = [];

    if([5859388511, 6920293690].includes(tg.initDataUnsafe.user?.id)) document.getElementById("adm-btn").style.display="block";

    async function load() {
        const r = await fetch(API + "/get_all", { headers: {"ngrok-skip-browser-warning":"1"} });
        const d = await r.json(); allI = d.items||[]; allP = d.payments||[];
        renderAdmin(); renderCheckout();
    }

    function tab(id, el) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active-nav"));
        el.classList.add("active-nav");
        load();
    }

    function copyNum(t) {
        const el = document.createElement("textarea");
        el.value = t; document.body.appendChild(el);
        el.select(); document.execCommand("copy");
        document.body.removeChild(el);
        tg.showAlert("COPIED TO CLIPBOARD");
    }

    async function confirmOrder() {
        const sel = document.getElementById("pay-sel").value;
        if(!sel) { tg.showAlert("SELECT PAYMENT"); return; }
        const total = cart.reduce((s, i) => s + parseFloat(i.p), 0);
        await fetch(API + "/send_order", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, user_name:tg.initDataUnsafe.user.username, items:cart, total:total, method:allP[sel].split("|")[0]})
        });
        tg.showAlert("ORDER SENT. UPLOAD SCREENSHOT IN CHAT.");
        cart = []; document.getElementById("c-count").innerText = "0"; renderCart();
    }

    function addToCart(u, p) {
        if(cart.find(x => x.u === u)) return;
        audio.play(); cart.push({u, p});
        document.getElementById("c-count").innerText = cart.length;
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById("cart-list");
        if(cart.length === 0) { list.innerHTML = "<p style='text-align:center;'>EMPTY</p>"; document.getElementById("checkout-sec").style.display="none"; return; }
        list.innerHTML = cart.map((i, idx) => `<div class="card"><span>@${i.u} - $${i.p}</span><button class="btn-small" style="color:red; border-color:red" onclick="cart.splice(${idx},1);renderCart();">X</button></div>`).join("");
        document.getElementById("checkout-sec").style.display = "block";
    }

    function renderAdmin() {
        document.getElementById("adm-pay-list").innerHTML = allP.map(p => {
            let name = p.split('|')[0].trim();
            return `<div class="card"><span>${name}</span><button class="btn-small" style="color:red; border-color:red" onclick="del('del_pay','${name}')">DEL</button></div>`;
        }).join("");
        document.getElementById("adm-items-list").innerHTML = allI.map(i => `<div class="card"><span>@${i.u}</span><button class="btn-small" style="color:red; border-color:red" onclick="del('del_user','${i.u}')">DEL</button></div>`).join("");
    }

    function showCat(c) {
        document.getElementById("cat-menu").style.display="none"; document.getElementById("items-view").style.display="block";
        const fil = allI.filter(i => i.c == c);
        document.getElementById("items-list").innerHTML = fil.map(i => {
            const inCart = cart.find(x => x.u === i.u);
            return `<div class="card"><div><b style="color:var(--gold)">@${i.u}</b><br><small>$${i.p}</small></div><button class="btn-small" ${inCart?"disabled":""} onclick="addToCart('${i.u}','${i.p}')">${inCart?"ADDED":"ADD"}</button></div>`;
        }).join("");
    }

    function backToCats() { document.getElementById("cat-menu").style.display="block"; document.getElementById("items-view").style.display="none"; }
    function renderCheckout() { const sel = document.getElementById("pay-sel"); sel.innerHTML = '<option value="">SELECT PAYMENT</option>' + allP.map((p, i) => `<option value="${i}">${p.split("|")[0]}</option>`).join(""); }
    function showPay(i) { if(i==="") { document.getElementById("pay-details").style.display="none"; return; } document.getElementById("pay-details").style.display="block"; document.getElementById("pay-num").innerText = allP[i].split("|")[1]?.trim(); }
    async function doAdm(action) { let content = (action==="add_users")?document.getElementById("adm-in").value:document.getElementById("pay-in").value; await fetch(API + "/admin/manage", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, action, content, cat:document.getElementById("adm-cat").value})}); document.getElementById("adm-in").value=""; load(); }
    async function del(action, val) { await fetch(API + "/admin/manage", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, action, content:val})}); load(); }

    tg.expand(); load();
</script>
</body>
</html>
