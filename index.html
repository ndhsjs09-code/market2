<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MW MARKET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffbd39; --bg: #0a0a0a; --card: #121212; --primary: #00f2ea; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; padding: 15px; padding-bottom: 100px; direction: ltr; }
        .tab { display: none; } .active { display: block; }
        .header { text-align: center; color: var(--gold); font-weight: 900; margin-bottom: 20px; font-size: 22px; padding: 10px; border-bottom: 1px solid var(--gold); }
        .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; }
        .cat-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 8px 15px; border-radius: 8px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { border-color: var(--gold); color: var(--gold); }
        .card { background: var(--card); border: 1px solid #222; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        .del-btn { background: #ff4444; color: white; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; border: none; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 18px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; cursor: pointer; font-weight: 900; } .active-nav { color: var(--gold); }
        .copy-box { background: #000; padding: 15px; border: 1px dashed var(--gold); margin: 10px 0; color: var(--gold); font-weight: bold; cursor: pointer; text-align: center; word-break: break-all; }
        #img-preview { width: 100%; display: none; border: 1px solid var(--gold); margin-top: 10px; }
    </style>
</head>
<body>

<div id="store-tab" class="tab active">
    <div class="header">MW MARKET</div>
    <div class="cat-scroll" id="cat-menu">
        <button class="cat-btn active" onclick="filterItems('All', this)">All</button>
        <button class="cat-btn" onclick="filterItems('3c/L', this)">3c/L</button>
        <button class="cat-btn" onclick="filterItems('4LL/CC', this)">4LL/CC</button>
        <button class="cat-btn" onclick="filterItems('4C/L Same', this)">4C/L Same</button>
        <button class="cat-btn" onclick="filterItems('4C/L', this)">4C/L</button>
        <button class="cat-btn" onclick="filterItems('Double/Triple', this)">Double/Triple</button>
    </div>
    <div id="items-list"></div>
</div>

<div id="cart-tab" class="tab">
    <div class="header">CART</div>
    <div id="cart-list"></div>
    <div id="checkout-sec" style="display:none">
        <div style="font-size:18px; font-weight:bold; margin:15px 0;">Total: <span id="total-price" style="color:var(--gold)">$0</span></div>
        <select id="pay-sel" onchange="showPay(this.value)"><option value="">SELECT PAYMENT</option></select>
        <div id="pay-details" style="display:none;">
            <div class="copy-box" onclick="copyNum(this.innerText)" id="pay-num"></div>
            <input type="file" id="receipt-file" accept="image/*" onchange="previewImg(this)">
            <img id="img-preview">
        </div>
        <button class="btn" id="send-btn" onclick="confirmOrder()">SEND ORDER</button>
    </div>
</div>

<div id="admin-tab" class="tab">
    <div class="header">SYSTEM</div>
    <select id="adm-cat">
        <option value="3c/L">3c/L</option><option value="4LL/CC">4LL/CC</option>
        <option value="4C/L Same">4C/L Same</option><option value="4C/L">4C/L</option>
        <option value="Double/Triple">Double/Triple</option>
    </select>
    <textarea id="adm-in" rows="3" placeholder="user:pass:price"></textarea>
    <button class="btn" onclick="doAdm('add_users')">SAVE ITEMS</button>
    <input id="pay-in" placeholder="Method | Details">
    <button class="btn" onclick="doAdm('add_pay')">ADD PAYMENT</button>
    <div id="adm-pay-list" style="margin-top:10px"></div>
    <div id="adm-items-list" style="margin-top:10px"></div>
</div>

<nav class="nav">
    <div class="nav-item active-nav" onclick="tab('store-tab', this)">STORE</div>
    <div class="nav-item" onclick="tab('cart-tab', this)">CART (<span id="c-count">0</span>)</div>
    <div id="adm-btn" class="nav-item" style="display:none" onclick="tab('admin-tab', this)">SYSTEM</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const API = "https://laquita-unperturbed-altagracia.ngrok-free.dev/mw";
    let allI = [], allP = [], cart = [], base64Img = null;

    if([5859388511, 6920293690].includes(tg.initDataUnsafe.user?.id)) document.getElementById("adm-btn").style.display="block";

    async function load() {
        const r = await fetch(API + "/get_all", { headers: {"ngrok-skip-browser-warning":"1"} });
        const d = await r.json(); allI = d.items||[]; allP = d.payments||[];
        renderItems(allI); renderAdmin(); renderCheckout();
    }

    function renderItems(items) {
        document.getElementById("items-list").innerHTML = items.map(i => `<div class="card">
            <div><b>@${i.u}</b><br><small style="color:var(--gold)">Price: $${i.p}</small></div>
            <button class="btn" style="padding:8px" onclick="addToCart('${i.u}','${i.p}')">ADD</button>
        </div>`).join("");
    }

    function filterItems(c, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(c === 'All') renderItems(allI);
        else renderItems(allI.filter(i => i.c === c));
    }

    function addToCart(u, p) {
        if(cart.find(x => x.u === u)) return;
        cart.push({u, p}); document.getElementById("c-count").innerText = cart.length;
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById("cart-list");
        let total = 0;
        if(cart.length === 0) { list.innerHTML = "<p style='text-align:center;'>EMPTY</p>"; document.getElementById("checkout-sec").style.display="none"; return; }
        list.innerHTML = cart.map((i, idx) => {
            total += parseFloat(i.p);
            return `<div class="card"><span>@${i.u} - $${i.p}</span><button class="del-btn" onclick="cart.splice(${idx},1);renderCart();">X</button></div>`;
        }).join("");
        document.getElementById("total-price").innerText = "$" + total;
        document.getElementById("checkout-sec").style.display = "block";
    }

    async function confirmOrder() {
        const selIdx = document.getElementById("pay-sel").value;
        if(!selIdx || !base64Img) return tg.showAlert("Select payment & upload receipt");
        await fetch(API + "/send_order", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, items:cart, total: cart.reduce((s,i)=>s+parseFloat(i.p),0), method:allP[selIdx].split("|")[0], image: base64Img})
        });
        tg.showAlert("ORDER SENT"); tg.close();
    }

    function previewImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { base64Img = e.target.result; document.getElementById("img-preview").src = base64Img; document.getElementById("img-preview").style.display = "block"; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function copyNum(t) { navigator.clipboard.writeText(t); tg.showAlert("COPIED"); }
    function showPay(i) { document.getElementById("pay-details").style.display = i === "" ? "none" : "block"; document.getElementById("pay-num").innerText = allP[i]?.split("|")[1] || ""; }
    
    function tab(id, el) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active-nav"));
        el.classList.add("active-nav");
    }

    async function doAdm(act) {
        await fetch(API + "/admin/manage", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_id:tg.initDataUnsafe.user.id, action:act, content: document.getElementById(act==='add_users'?'adm-in':'pay-in').value, cat: document.getElementById("adm-cat").value})});
        load();
    }

    tg.expand(); load();
</script>
</body>
</html>
